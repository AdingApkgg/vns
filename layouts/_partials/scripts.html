<script>
  const swup = new Swup({
    containers: ["#swup", "header", "footer"],
    linkSelector: "a[href]:not([data-no-swup])",
    plugins: [
      new SwupParallelPlugin({ containers: ['#swup'] }),
      new SwupPreloadPlugin(),
      new SwupScrollPlugin(),
      new SwupA11yPlugin(),
      new SwupProgressPlugin(),
      new SwupHeadPlugin({
        persistAssets: true,
        persistTags: 'link[rel="stylesheet"], script[src], style',
      }),
      new SwupBodyClassPlugin(),
    ],
  });
</script>
{{ partialCached "head/js.html" . }}
<!-- 浮动操作按钮 -->
<!-- column-reverse 布局：DOM 中越靠前越靠下。menuToggle 桌面端隐藏，
     因此桌面端 jump-to-comments 落在最底部（贴合“右下角”需求）；
     移动端 menuToggle 仍保持在最底部的原有位置，跳转评论按钮位于其上方。 -->
<div class="floating-actions">
  <button id="menuToggle" class="fab-btn" title="切换菜单" aria-label="切换导航菜单" aria-expanded="false" data-target="header">
    <i class="fa fa-bars" aria-hidden="true"></i>
  </button>
  <button id="jump-to-comments" class="fab-btn" title="跳转到评论" aria-label="跳转到评论区">
    <i class="fa fa-comment-dots" aria-hidden="true"></i>
  </button>
  <button id="back-to-top" class="fab-btn" title="返回顶部" aria-label="返回页面顶部">
    <i class="fa fa-angles-up" aria-hidden="true"></i>
  </button>
</div>
<span id="fps"></span>
