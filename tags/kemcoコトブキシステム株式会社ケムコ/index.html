  <h1>KEMCO／コトブキシステム／株式会社ケムコ</h1>
   
  <h2><a href="/p/37037/">人狼村之谜／レイジングループ／Raging Loop／乐境虏逋</a></h2>
  <p><img class="zoomable" loading="lazy" src="https://static.saop.cc/vns/img/rl.webp" title="rl"
    alt="rl" /></p>
<p>《<strong>人狼村之谜</strong>》（日语：レイジングループ，英语：<em>Raging Loop</em>）是<a href="https://zh.wikipedia.org/w/index.php?title=KEMCO&amp;action=edit&amp;redlink=1"  target="_blank" rel="noopener" >KEMCO</a>开发的一款悬疑解谜题材<a href="https://zh.wikipedia.org/wiki/%e5%86%92%e9%9a%aa%e9%81%8a%e6%88%b2"  target="_blank" rel="noopener" >冒险游戏</a>。2015年12月3日于日本地区的<a href="https://zh.wikipedia.org/wiki/Android"  target="_blank" rel="noopener" >Android</a>和<a href="https://zh.wikipedia.org/wiki/IOS"  target="_blank" rel="noopener" >iOS</a>平台推出，之后陆续移植到<a href="https://zh.wikipedia.org/wiki/PlayStation_Vita"  target="_blank" rel="noopener" >PlayStation Vita</a>、<a href="https://zh.wikipedia.org/wiki/PlayStation_4"  target="_blank" rel="noopener" >PlayStation 4</a>、<a href="https://zh.wikipedia.org/wiki/%e4%bb%bb%e5%a4%a9%e5%a0%82Switch"  target="_blank" rel="noopener" >任天堂Switch</a>、<a href="https://zh.wikipedia.org/wiki/Windows"  target="_blank" rel="noopener" >Windows</a>等平台。</p>
